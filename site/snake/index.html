<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Snake — ClawShahBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    html,body{height:100%;margin:0}
    body{background:#041022;color:#fff;font-family:Inter,Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center}
    #container{width:100%;max-width:720px;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
    #game{background:#071019;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.6);touch-action:none}
    #ui-top{position:absolute;top:18px;left:18px;font-weight:600}
    #ui-right{position:absolute;top:18px;right:18px;text-align:right}
    #controls{position:absolute;left:12px;bottom:10px;width:36%;max-width:240px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:8px}
    .ctrl{background:rgba(255,255,255,0.06);border-radius:10px;border:none;color:#fff;font-size:20px;padding:12px}
    .ctrl.blank{background:transparent}
    #startOverlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .card{background:linear-gradient(180deg,#062038,#05242e);padding:18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.6);max-width:320px;text-align:center}
    .btn{background:#0a84ff;border:none;color:#fff;padding:10px 14px;border-radius:8px;margin-top:10px;font-weight:700}
    .option{margin-top:8px}
    .small{font-size:14px;color:#cfd8e3}
  </style>
</head>
<body>
<div id="container">
  <canvas id="game"></canvas>
  <div id="ui-top">Score: <span id="score">0</span></div>
  <div id="ui-right">Best: <span id="best">0</span></div>
  <div id="controls">
    <div></div><button class="ctrl" id="up">▲</button><div></div>
    <button class="ctrl" id="left">◀</button><div class="ctrl blank"></div><button class="ctrl" id="right">▶</button>
    <div></div><button class="ctrl" id="down">▼</button><div></div>
  </div>
  <div id="startOverlay">
    <div class="card">
      <h2>ClawShahBot: Snake</h2>
      <p class="small">A simple web Snake game — choose difficulty and press Play. Works on mobile (touch & swipe) and desktop (arrow keys).</p>
      <div class="option">Difficulty: <select id="difficulty"><option value="150">Easy</option><option value="120" selected>Normal</option><option value="90">Hard</option></select></div>
      <button id="playBtn" class="btn">Play</button>
      <div style="margin-top:10px"><button id="resumeBtn" class="btn" style="display:none">Resume</button></div>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');
const container=document.getElementById('container');
function resizeCanvas(){const pad=32;const availW=Math.min(window.innerWidth-40,720);const availH=window.innerHeight-40;const size=Math.floor(Math.min(availW,availH));canvas.style.width=size+'px';canvas.style.height=size+'px';const dpr=window.devicePixelRatio||1;canvas.width=size*dpr;canvas.height=size*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
let scale=20;let cols,rows;function resetGrid(){cols=Math.floor((canvas.clientWidth)/scale);rows=Math.floor((canvas.clientHeight)/scale);if(cols<10)cols=10;if(rows<10)rows=10}
resetGrid();window.addEventListener('resize',resetGrid);
let snake=[{x:8,y:8}], dir={x:1,y:0}, food={}, score=0, best=localStorage.getItem('snake_best')||0;document.getElementById('best').innerText=best;let tick=null, running=false;
function rand(max){return Math.floor(Math.random()*max)}
function placeFood(){food.x=rand(cols);food.y=rand(rows);for(let s of snake)if(s.x==food.x&&s.y==food.y)placeFood()}
function draw(){ctx.fillStyle='#071019';ctx.fillRect(0,0,canvas.clientWidth,canvas.clientHeight);ctx.fillStyle='#ff3b30';ctx.fillRect(food.x*scale,food.y*scale,scale,scale);ctx.fillStyle='#34c759';for(let s of snake)ctx.fillRect(s.x*scale+1,s.y*scale+1,scale-2,scale-2)}
function update(){const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(head.x<0||head.x>=cols||head.y<0||head.y>=rows||snake.some(s=>s.x==head.x&&s.y==head.y)){gameOver();return;}snake.unshift(head);if(head.x==food.x&&head.y==food.y){score++;document.getElementById('score').innerText=score;placeFood()}else snake.pop()}
function loop(){update();draw()}
function startGame(){const diff=document.getElementById('difficulty').value;if(tick)clearInterval(tick);tick=setInterval(loop,parseInt(diff));running=true;document.getElementById('startOverlay').style.display='none'}
function pauseGame(){if(tick)clearInterval(tick);running=false}
function gameOver(){pauseGame();document.getElementById('startOverlay').style.display='flex';document.getElementById('ovText')?.remove();const card=document.querySelector('.card');if(card){card.querySelector('h2').innerText='Game Over';if(!document.getElementById('ovText')){let p=document.createElement('p');p.id='ovText';p.className='small';p.innerText='Score: '+score;card.appendChild(p);} } if(score>best){best=score;localStorage.setItem('snake_best',best);document.getElementById('best').innerText=best}score=0;document.getElementById('score').innerText=0;snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];dir={x:1,y:0};placeFood()}
window.addEventListener('keydown',e=>{const k=e.key;if(k=='ArrowUp'&&dir.y==0)dir={x:0,y:-1};if(k=='ArrowDown'&&dir.y==0)dir={x:0,y:1};if(k=='ArrowLeft'&&dir.x==0)dir={x:-1,y:0};if(k=='ArrowRight'&&dir.x==0)dir={x:1,y:0}});
// D-pad touch buttons
['up','down','left','right'].forEach(id=>{document.getElementById(id).addEventListener('touchstart',e=>{e.preventDefault(); if(id=='up'&&dir.y==0)dir={x:0,y:-1}; if(id=='down'&&dir.y==0)dir={x:0,y:1}; if(id=='left'&&dir.x==0)dir={x:-1,y:0}; if(id=='right'&&dir.x==0)dir={x:1,y:0}})});
// swipe detection
let touchStart=null;canvas.addEventListener('touchstart',e=>{touchStart=e.touches[0]});canvas.addEventListener('touchend',e=>{if(!touchStart) return;let t=e.changedTouches[0];let dx=t.clientX-touchStart.clientX,dy=t.clientY-touchStart.clientY; if(Math.abs(dx)>Math.abs(dy)){ if(dx>0&&dir.x==0)dir={x:1,y:0}; else if(dx<0&&dir.x==0)dir={x:-1,y:0}; } else { if(dy>0&&dir.y==0)dir={x:0,y:1}; else if(dy<0&&dir.y==0)dir={x:0,y:-1}; } touchStart=null; });
// overlay controls
document.getElementById('playBtn').addEventListener('click',()=>{startGame()});document.getElementById('resumeBtn').addEventListener('click',()=>{startGame()});
// init
function init(){resetGrid();snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];placeFood();draw()}
function resetGrid(){cols=Math.floor(canvas.clientWidth/scale);rows=Math.floor(canvas.clientHeight/scale);if(cols<10)cols=10;if(rows<10)rows=10}
init();
</script>
</body>
</html>
