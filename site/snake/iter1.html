<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Snake — Iteration 1 (Play)</title>
<style>
:root{--bg:#0b1220;--card:#0e1724;--accent:#00f5a0}
html,body{height:100%;margin:0;font-family:Inter,Arial;background:linear-gradient(180deg,#071424,#041022);display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:420px;padding:12px}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:16px;padding:12px;color:#e7fbf0}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.title{font-weight:700}
#gameWrap{position:relative}
canvas{width:100%;height:auto;border-radius:12px;background:#051018;display:block}
.controls{display:flex;justify-content:space-between;margin-top:10px}
.btn{background:var(--accent);border:none;padding:8px 12px;border-radius:10px;color:#001;font-weight:700}
.dpad{display:flex;gap:8px;justify-content:center;margin-top:10px}
.dpad button{width:64px;height:64px;border-radius:12px;border:none;background:rgba(255,255,255,0.04);color:#fff;font-size:20px}
.small{color:#9fb2c8;font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <header><div class="title">Snake — Iteration 1</div><div class="small">Play test</div></header>
    <div id="gameWrap"><canvas id="c"></canvas></div>
    <div class="controls"><button id="play" class="btn">Play</button><button id="pause" class="btn" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.05)">Pause</button></div>
    <div class="dpad"><button id="up">▲</button><button id="left">◀</button><button id="right">▶</button><button id="down">▼</button></div>
    <div style="margin-top:10px" class="small">Swipe or use D‑pad. Tap Play to begin.</div>
  </div>
</div>
<script>
// Round1: Add wrap-around behavior (classic snake)
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');function fit(){const size=Math.min(window.innerWidth-40,420);canvas.style.width=size+'px';canvas.style.height=size+'px';canvas.width=size;canvas.height=size;}fit();window.addEventListener('resize',fit);
const cell=20;let cols,rows;function grid(){cols=Math.floor(canvas.width/cell);rows=cols;}grid();
let snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}],dir={x:1,y:0},food={},running=false,interval=140,tid=null,score=0;
function rand(){return Math.floor(Math.random()*cols)}
function placeFood(){food.x=rand();food.y=rand();for(let s of snake) if(s.x==food.x && s.y==food.y) placeFood()}
function draw(){ctx.fillStyle='#051018';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#ff3b30';ctx.fillRect(food.x*cell,food.y*cell,cell,cell);ctx.fillStyle='#34c759';for(let s of snake)ctx.fillRect(s.x*cell,s.y*cell,cell,cell)}
// WRAP-AROUND step: head wraps across edges; game over only on self collision
function step(){let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
 // wrap horizontally
 if(head.x<0) head.x = cols-1;
 else if(head.x>=cols) head.x = 0;
 // wrap vertically
 if(head.y<0) head.y = rows-1;
 else if(head.y>=rows) head.y = 0;
 // self collision check
 if(snake.some(s=>s.x==head.x && s.y==head.y)) { reset(); return; }
 snake.unshift(head);
 if(head.x==food.x && head.y==food.y){ score++; placeFood(); } else snake.pop(); }
function loop(){step();draw()}
function start(){if(running) return;running=true;tid=setInterval(loop,interval)}
function pause(){running=false;clearInterval(tid)}
function reset(){pause();snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];dir={x:1,y:0};score=0;placeFood();draw()}
// input
['up','down','left','right'].forEach(id=>document.getElementById(id).addEventListener('click',()=>{if(id=='up'&&dir.y==0)dir={x:0,y:-1}; if(id=='down'&&dir.y==0)dir={x:0,y:1}; if(id=='left'&&dir.x==0)dir={x:-1,y:0}; if(id=='right'&&dir.x==0)dir={x:1,y:0};}))
let ts=null;canvas.addEventListener('touchstart',e=>{ts=e.touches[0]});canvas.addEventListener('touchend',e=>{if(!ts) return;let t=e.changedTouches[0];let dx=t.clientX-ts.clientX,dy=t.clientY-ts.clientY; if(Math.abs(dx)>Math.abs(dy)){ if(dx>20&&dir.x==0)dir={x:1,y:0}; else if(dx<-20&&dir.x==0)dir={x:-1,y:0}; } else { if(dy>20&&dir.y==0)dir={x:0,y:1}; else if(dy<-20&&dir.y==0)dir={x:0,y:-1}; } ts=null;});
window.addEventListener('keydown',e=>{const k=e.key;if(k=='ArrowUp'&&dir.y==0)dir={x:0,y:-1};if(k=='ArrowDown'&&dir.y==0)dir={x:0,y:1};if(k=='ArrowLeft'&&dir.x==0)dir={x:-1,y:0};if(k=='ArrowRight'&&dir.x==0)dir={x:1,y:0}});
// UI
document.getElementById('play').addEventListener('click',()=>start());document.getElementById('pause').addEventListener('click',()=>pause());
// init
placeFood();draw();
</script>
</body></html>
